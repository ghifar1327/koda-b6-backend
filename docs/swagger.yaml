      description: Retrieve all review products for landing page
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ReviewProduct'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.Response'
