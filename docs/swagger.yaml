    post:
      consumes:
      - application/json
      description: Create a new transaction with transaction details
      parameters:
      - description: Transaction Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTransactionRequest'
      produces:
